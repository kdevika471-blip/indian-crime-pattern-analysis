{% extends "base.html" %}

{% block title %}{{ title }} | Crime Analytics{% endblock %}

{% block head %}
<style>
    .iframe-container {
        position: relative;
        width: 100%;
        height: calc(100vh - 80px); /* Adjust based on navbar height */
        overflow: hidden;
        border-radius: 12px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="container" style="max-width: 100%; padding: 10px;">
    <div class="iframe-container">
        <iframe src="{{ dashboard_url }}" 
                title="{{ title }}"
                allowfullscreen="true"></iframe>
    </div>
</div>
{% endblock %}
